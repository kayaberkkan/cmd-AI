name: Release Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macOS
            arch: arm64
            runner: macos-latest
            artifact_name: cmdAI-macOS-arm64.zip
          - os: Windows
            arch: amd64
            runner: windows-latest
            artifact_name: cmdAI-windows-amd64.zip
          - os: Linux
            arch: amd64
            runner: ubuntu-latest
            artifact_name: cmdAI-linux-amd64.tar.gz
          - os: Linux
            arch: arm64
            runner: ubuntu-24.04-arm
            artifact_name: cmdAI-linux-arm64.tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Package (macOS / Linux)
        if: matrix.os != 'Windows'
        run: |
          chmod +x build.sh package.sh
          ./package.sh

      - name: Build and Package (Windows)
        if: matrix.os == 'Windows'
        shell: cmd
        run: |
          call package_win.bat

      - name: Compress macOS Output
        if: matrix.os == 'macOS'
        run: |
          zip -r ${{ matrix.artifact_name }} cmdAI.app

      - name: Compress Windows Output
        if: matrix.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path cmdAI -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.os }}-build
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/cmdAI-macOS-arm64.zip
            artifacts/cmdAI-windows-amd64.zip
            artifacts/cmdAI-linux-amd64.tar.gz
            artifacts/cmdAI-linux-arm64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
